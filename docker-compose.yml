services:
  angular-frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: justeat_angular_frontend_dev
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    extra_hosts:
      - "host.docker.internal:host-gateway"
